<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QueuingHub</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 1rem;

      display: flex;              /* 👈 enables horizontal layout */
      justify-content: space-between; /* left + right */
      align-items: center;        /* vertical alignment */
    }

    nav {
      background: #555;
      padding: 0.5rem;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
      margin-bottom: 60px; /* avoids footer overlap */
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .button {
      background: #8a958a;
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .button:hover {
      background: #45a049;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="header-left">
      <h1>Queuing time manager</h1>
      <p>A simple HTML page</p>
    </div>
  </header>

  <main>
    <!-- App name -->
    <h1 id="app-title">Locations</h1>

    <!-- Top bar -->
    <div class="top-bar" >
      <a class="button" href="create.html?type=place">
        Create new place
      </a>
    </div>

    <section>
      <!-- Locations section -->
      <!-- <h2>Locations</h2> -->
      <div id="locations-container"></div>
    </section>
  </main>

  <footer>
    <p>© 2026 ryhma2</p>
  </footer>

  <!-- JS that loads locations + places -->
  <script type="module" src="../static/js/home.js"></script>
</body>
</html>
