<!DOCTYPE html>
<html>
<head>
  <title>Edit</title>
</head>
<body>

<h1 id="title">Edit</h1>

<form id="form">
  <!-- Place fields -->
  <div id="place-fields">
    <input id="place-name" placeholder="Name" />
    <input id="capacity" type="number" placeholder="Capacity" />
    <input id="people-count" type="number" placeholder="People count" />
    <input id="place-type" placeholder="Place type" />
    <input id="location" placeholder="Location" />
  </div>

  <!-- Queue fields -->
  <div id="queue-fields" style="display:none;">
    <input id="queue-type" placeholder="Queue type" />
    <input id="people-count" type="number" placeholder="People count" />
  </div>

  <button type="submit">Save changes</button>
</form>

<script type="module" src="../static/js/form.js"></script>
</body>
</html>
