<!DOCTYPE html>
<html>
<head>
  <title>Create</title>
</head>
<body>

<h1 id="title">Create</h1>

<form id="form">
  <!-- Place fields -->
  <div id="place-fields">
    <input id="place-name" placeholder="Place name" required />
    <input id="location" placeholder="Location" required />
  </div>

  <!-- Queue fields -->
  <div id="queue-fields" style="display:none;">
    <input id="queue-type" placeholder="Queue type" required />
    <input id="queue-size" type="number" placeholder="Queue size" />
  </div>

  <button type="submit">Create</button>
</form>

<script type="module" src="../static/js/create.js"></script>
</body>
</html>
