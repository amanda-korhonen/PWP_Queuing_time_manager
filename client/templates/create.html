<!DOCTYPE html>
<html lang="en"></html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 0.5rem;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
      margin-bottom: 60px; /* avoids footer overlap */
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
    label {
      display: block;
      margin-top: 10px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
    }
    form {
      background: transparent;
      padding: 20px;
      border-radius: 8px;

      max-width: 400px;   /* key line */
    }
  </style>
</head>
<body>
  <header>
    <h1>Queuing time manager</h1>
    <p>Create</p>
  </header>

  <nav>
    <a href="home.html">Back to home page</a>
  </nav>

<main>

  <h1 id="title">Create</h1>

  <form id="form">
    <!-- Place fields -->
    <div id="place-fields">
      <input id="place-name" placeholder="Name" />
      <input id="capacity" type="number" placeholder="Capacity" />
      <input id="place-people-count" type="number" placeholder="People count" />
      <input id="place-type" placeholder="Place type" />
      <input id="location" placeholder="Location" />
    </div>

    <!-- Queue fields -->
    <div id="queue-fields" style="display:none;">
      <input id="queue-type" placeholder="Queue type" />
      <input id="queue-people-count" type="number" placeholder="People count" />
    </div>

    <button type="submit">Create</button>
  </form>

</main>

<footer>
  <p>© 2026 ryhma2</p>
</footer>

<script type="module" src="../static/js/form.js"></script>
</body>
</html>
