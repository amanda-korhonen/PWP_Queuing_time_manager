"Make a simple html style element for the following page".
Other components were self-made with trial and error and by using chapters

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Establishment</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }

    nav {
      background: #555;
      padding: 0.5rem;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 10px;
      text-decoration: none;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      padding: 20px;
      margin-bottom: 60px; /* avoids footer overlap */
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .button {
      background: #8a958a;
      color: white;
      padding: 10px 14px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .button:hover {
      background: #45a049;
    }

    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <h1>Queuing time manager</h1>
    <p id="app-description"></p>
  </header>

  <nav>
    <a href="home.html">Home</a>
  </nav>

<main>

  <section>
    <h2 id="app-title"></h2>
      <a id="editButton" class="button" href="#">
        Edit...
      </a>
    <ul id="place-details"></ul>

    <div class="top-bar" >
      <a id="createQueueButton" class="button" href="#">
        Create new queue
      </a>
    </div>

    <h2>Queues</h2>
    <ul id="places-list"></ul>
  </section>

</main>

<footer>
  <p>© 2026 ryhma2</p>
</footer>

<script type="module" src="../static/js/establishment.js"></script>

</body>
</html>
