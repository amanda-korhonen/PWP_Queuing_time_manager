parameters:
- $ref: '#/components/parameters/place'
- $ref: '#/components/parameters/queue_type'
description: Get the list of queues for a place
responses:
  '200':
    description: A queue for a plcae
    content:
      application/json:
        example:
          queue_type: General
          people_count: 12
          place: Club1
  '404':
    description: The queue was not found