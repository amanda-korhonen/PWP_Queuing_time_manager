# Code basis taken from the sensorhub example
# https://github.com/UniOulu-Ubicomp-Programming-Courses/pwp-sensorhub-example/tree/ex3-03-multiple-yml/doc
# Modified to fit into our implementation
---
parameters:
- $ref: '#/components/parameters/place'
description: Get the list of queues for a place
responses:
  '200':
    description: List of queues for a place
    content:
      application/json:
        example:
        - queue_type: VIP
          people_count: 12
          place: Club1
        - queue_type: General
          people_count: 0
          place: Club1
  '404':
    description: Queues not found