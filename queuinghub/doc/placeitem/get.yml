# Code basis taken from the sensorhub example
# https://github.com/UniOulu-Ubicomp-Programming-Courses/pwp-sensorhub-example/tree/ex3-03-multiple-yml/doc
# Modified to fit into our implementation
---
parameters:
- $ref: '#/components/parameters/place'
description: Get information of a specific establishment
responses:
  '200':
    description: Data of an establishment 
    content:
      application/json:
        example:
          name: Bar1
          capacity: 50
          people_count: 30
          place_type: Bar1
          location: City1
          fullness: 0.6
  '404':
    description: The establishment was not found
          

