---
parameters:
- $ref: '#/components/parameters/location'
description: Get all places in a specific location
responses:
  '200':
    description: A list of places in the specified location
    content:
      application/json:
        example:
        - name: "Place1"
          URI: /locations/place1/
        - name: "Place2"
          URI: /locations/place2/
  '404':
    description: Location not found