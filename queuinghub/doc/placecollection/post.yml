# Code basis taken from the sensorhub example
# https://github.com/UniOulu-Ubicomp-Programming-Courses/pwp-sensorhub-example/tree/ex3-03-multiple-yml/doc
# Modified to fit into our implementation
---
description: Create a new establishment
requestBody:
  description: JSON document that contains basic data for a new establishment
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Place'
      example:
        name: new-establishment-example
        capacity: 400
        people_count: 0
        place_type: Club
        location: City2
responses:
  '201':
    description: A new establishment was created succesfully
    headers:
      Location:
        description: URI of the new establishment
        schema:
          type: string
  '400':
    description: The request body was not valid
  '409':
    description: Place already exists
  '415':
    description: Request content must be JSON